<!DOCTYPE html>

<html>

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .block-heading {
      text-align: center;
      color: #3b99e0;
      margin-bottom: 30px;
    }

    .summary {
      background-color: #f7fbff;
      border-top: 2px solid #5ea4f3;
      padding: 20px;
    }

    .summary .btn {
      background-color: #3b99e0;
      color: white;
      width: 100%;
    }

    .product {
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>
	<div class="container mt-5">

  <!-- Heading -->
  <div class="block-heading">
    <h2>Shopping Cart</h2>
    <p>Your selected items are listed below</p>
  </div>

  <div class="row">
    <!-- Products Section -->
    <div class="col-lg-8">

      <!-- Product -->
      <div class="product">
        <div class="row align-items-center">
          <!-- Images -->
          <div class="col-md-4 d-flex flex-column">
            <img src="https://via.placeholder.com/100" class="img-fluid mb-2">
            <img src="https://via.placeholder.com/100" class="img-fluid mb-2">
            <img src="https://via.placeholder.com/100" class="img-fluid">
          </div>
          <!-- Details -->
          <div class="col-md-8">
            <h5>Product Name</h5>
            <p>Description of the product goes here.</p>
            <p><strong>Price:</strong> $100</p>
          </div>
        </div>
      </div>

    </div>

    <!-- Summary Section -->
    <div class="col-lg-4">
      <div class="summary">
        <h4>Summary</h4>
        <div class="d-flex justify-content-between border-bottom pb-2 mb-2">
          <span>Subtotal</span>
          <span>$100</span>
        </div>
        <div class="d-flex justify-content-between border-bottom pb-2 mb-2">
          <span>Discount</span>
          <span>$0</span>
        </div>
        <div class="d-flex justify-content-between mb-3">
          <strong>Total</strong>
          <strong>$100</strong>
        </div>
        <a href="#" class="btn">Checkout</a>
      </div>
    </div>

  </div>
</div>

</body>

</html>
